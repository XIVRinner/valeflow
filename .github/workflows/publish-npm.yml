name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # triggers on v0.1.0, v1.0.0, etc.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node with npm registry auth ───────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Sync package version from tag ─────────────────────────
      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      # ── 5. Build the library ─────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Verify the package contents before publishing ─────────
      - name: Dry-run pack (inspect what will be published)
        run: npm pack --dry-run

      # ── 7. Publish ───────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
